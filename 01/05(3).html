<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>날짜와 시간</title>
  </head>
  <body>
    <form>
      <h1>날짜 지정하기</h1>
      <input type="date" />
      <input type="month" />
      <input type="week" />
      <hr />
      <h1>시간 지정하기</h1>
      <input type="time" />
      <input type="datetime-local" />
      <hr />
      <h1>범위 제안하기</h1>
      <input type="date" min="2026-01-01" max="2026-12-31" />
      <input type="time" min="00:00" max="23:59" />
    </form>
  </body>
</html>
