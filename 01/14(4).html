<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>세션 선택 - switch문</title>
    <link rel="stylesheey" href="css/switch.css" />
  </head>
  <body>
    <script>
      var session = prompt(
        "관심 세션을 선택해 주세요. 1- 마케팅, 2- 개발, 3- 디자인",
      );

      switch (session) {
        case "1":
          document.write(
            "<p>마케팅 세션은 <strong>201호</strong>에서 진행됩니다.</p>",
          );
          break;
        case "2":
          document.write(
            "<p>개발 세션은 <strong>203호</strong>에서 진행됩니다.</p>",
          );
          break;
        case "3":
          document.write(
            "<p>디자인 세션은 <strong>205호</strong>에서 진행됩니다.</p>",
          );
          break;
        default:
          document.write("<p>잘못 입렵했습니다.</p>");
          break;
      }
    </script>
  </body>
</html>
//css/switch.css 영상속에서 안남옴
