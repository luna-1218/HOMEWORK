<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>회원가입</title>
    <style>
      #container {
        width: 600px;
        margin: 10px auto;
      }
    </style>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="container">
      <h1>회원가입을 환영합니다.</h1>
      <form>
        <fieldset>
          <legend>사용자 정보</legend>
          <ul>
            <li>
              <label for="uid">아이디:</label>
              <input
                type="text"
                id="uid"
                autofocus
                placeholder="4자~ 10자 사이, 공백없이"
                required
              />
            </li>
            <li>
              <label for="umail">이메일:</label>
              <input type="email" id="umail" required />
            </li>
            <li>
              <label for="pwd1">비밀번호:</label>
              <input
                type="password"
                id="pwd1"
                placeholder="문자와 숫자, 특수 기호 포함"
                required
              />
            </li>
            <li>
              <label for="pw2">비밀번호 확인:</label>
              <input
                type="password"
                id="confirm_password"
                name="confirm_password"
                required
              /><br /><br />
            </li>
          </ul>
        </fieldset>
        <button type="submit">회원가입</button>
      </form>
    </div>
  </body>
</html>
