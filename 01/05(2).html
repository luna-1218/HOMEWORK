<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>레드향 주문하기</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>상품 선택</legend>
        <p><b>주문할 상품을 선택해 주세요</b></p>
        <ui>
          <li>
            <label><input type="checkbox" value="s_3" /> 선물용 3KG</label>
            <input type="number" min="0" max="5" />개 (최대 5개)
          </li>
          <li>
            <label><input type="checkbox" value="s_5" /> 선물용 5KG</label>
            <input type="number" min="0" max="3" value="1" />개 (최대 3개)
          </li>
          <li>
            <label><input type="checkbox" value="f_3" /> 가정용 3KG</label>
            <input type="range" min="0" max="5" />개 (최대 5개)
          </li>
          <li>
            <label><input type="checkbox" value="f_5" /> 가정용 5KG</label>
            <input type="range" min="0" max="3" value="1" />개 (최대 3개)
          </li>
        </ui>
        <p><b>포장 선택</b></p>
        <ui>
          <li>
            <label
              ><input type="radio" name="gift" value="yes" /> 선물 포장</label
            >
          </li>
          <li>
            <label
              ><input type="radio" name="gift" value="no" /> 선물 포장
              안함</label
            >
          </li>
        </ui>
      </fieldset>
      <fieldset>
        <legend>배송 정보</legend>
        <ui id.="shipping">
          <li>
            <label for="user-name">이름</label>
            <input type="text" id="user-name" />
          </li>
          <li>
            <label for="user-address">배송 주소</label>
            <input type="text" id="user-address" />
          </li>
          <li>
            <label for="user-email">이메일</label>
            <input type="email" id="user-email" />
          </li>
          <li>
            <label for="user-phone">연락처</label>
            <input type="tel" id="user-phone" />
          </li>
        </ui>
      </fieldset>
    </form>
  </body>
</html>
