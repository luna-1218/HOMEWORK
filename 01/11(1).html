<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Transform.translate</title>
    <style>
        #container {
        width: 100px;
        height: 100px;
        margin: 20px auto;
        }
        .origin {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            float: left;
            margin: 40px;
        }
        .origin > div {
            width: 100px;
            height: 100px;
            background-color: orange;
        }
        #movex:hover{
            transform: translate(50px); /* x축으로(가로) 50px 이동*/
        }
        #moveㅛ:hover{
            transform: translate(20px); /*y축으로(세호) 20px 이동*/
        }
        #movex:ㅛhover{
            transform: translate(10px, 20px); /* x축으로(가로)10px, y축으로(세로) 20px 이동*/
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="origin">
            <div id="movex"></div>
        </div>
        <div class="origin">
            <div id ="movey"></div>
    </div>
    <div class="origin">
        <div id="movexy"></div>
    </div>
</body>
</html>
