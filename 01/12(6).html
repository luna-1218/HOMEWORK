<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Grid Layout</title>
    <style>
      #wrapper {
        width: 700px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(3, 100px);
      }
      .box {
        padding: 15px;
        color: #fff;
        font-weight: bold;
        text-align: center;
      }
      .box1 {
        background-color: #3689ff;
        grid-column: 1 / 4;
      }
      .box2 {
        background-color: #00cf12;
        grid-row: 2 / 4;
      }
      .box3 {
        background-color: #ff9019;
        grid-column: 2 / 4;
        grid-row-start: 2;
      }
      .box4 {
        background-color: #ffd000;
        grid-column-start: 3;
        grid-row-start: 3;
      }
    </style>
  </head>
  <body></body>
</html>
